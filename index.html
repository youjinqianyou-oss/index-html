<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>極速躲避最終版</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}
canvas {
    display: block;
    margin: 0 auto;
    background: #111;
    border-radius: 10px;
}
#ui {
    margin: 10px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>⚡ 極速躲避 Ultimate ⚡</h1>
<div id="ui">分數: 0 ｜ ❤️ 3</div>
<canvas id="game" width="400" height="600"></canvas>

<script>
// --- 基本設定 ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 180, y: 520, w: 40, h: 40, speed: 8 };
let obstacles = [];
let particles = [];
let keys = {};
let score = 0;
let hp = 3;
let speed = 3;
let gameOver = false;

// --- 音效 ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.start();
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}
setInterval(()=>{if(!gameOver) beep(200+Math.random()*200,0.05)},150);

// --- 控制 ---
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// --- 手機觸控 ---
let touchX = null;
canvas.addEventListener("touchstart", e=>touchX=e.touches[0].clientX);
canvas.addEventListener("touchmove", e=>{touchX=e.touches[0].clientX});
canvas.addEventListener("touchend", e=>touchX=null);

// --- 生成障礙 ---
function spawnObstacle(){
    let size=Math.random()*30+20;
    obstacles.push({x:Math.random()*(canvas.width-size),y:-size,w:size,h:size});
}
setInterval(spawnObstacle,500);

// --- 粒子爆炸 ---
function createParticles(x,y,color){
    for(let i=0;i<15;i++){
        particles.push({
            x:x,
            y:y,
            vx:(Math.random()-0.5)*6,
            vy:(Math.random()-0.5)*6,
            alpha:1,
            color:color
        });
    }
}

// --- 更新 ---
function update(){
    if(gameOver) return;

    // 玩家移動
    if(keys["ArrowLeft"] && player.x>0) player.x-=player.speed;
    if(keys["ArrowRight"] && player.x<canvas.width-player.w) player.x+=player.speed;
    if(touchX!==null){
        let target = touchX - canvas.getBoundingClientRect().left - player.w/2;
        if(target>player.x) player.x+=player.speed;
        else if(target<player.x) player.x-=player.speed;
    }

    // 障礙更新
    obstacles.forEach((o,i)=>{
        o.y+=speed;
        // 碰撞
        if(player.x<o.x+o.w && player.x+player.w>o.x && player.y<o.y+o.h && player.y+player.h>o.y){
            hp--;
            beep(80,0.2);
            createParticles(player.x+player.w/2,player.y+player.h/2,"#ff4444");
            o.y = canvas.height+100;
            if(hp<=0){
                gameOver=true;
                setTimeout(()=>{alert("💀 遊戲結束！分數: "+score);location.reload();},100);
            }
        }
    });
    obstacles = obstacles.filter(o=>o.y<canvas.height);

    // 粒子更新
    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.alpha-=0.03;
    });
    particles = particles.filter(p=>p.alpha>0);

    // 分數 & 難度
    score++;
    if(score%50===0) speed+=0.5;

    document.getElementById("ui").innerText="分數: "+score+" ｜ ❤️ "+hp;
}

// --- 繪製 ---
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 玩家發光
    ctx.fillStyle="#00ffcc";
    ctx.shadowBlur=15;
    ctx.shadowColor="#00ffcc";
    ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.shadowBlur=0;

    // 障礙
    ctx.fillStyle="#ff3333";
    obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));

    // 粒子
    particles.forEach(p=>{
        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,4,4);
        ctx.globalAlpha=1;
    });
}

// --- 主循環 ---
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
